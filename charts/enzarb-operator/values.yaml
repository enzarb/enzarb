replicaCount: 1

image:
  repository: ghcr.io/enzarb/operator
  pullPolicy: IfNotPresent
  tag: ""  # defaults to Chart.appVersion

imagePullSecrets: []

serviceAccount:
  name: enzarb-operator

leaderElection: true

env:
  ENZARB_DOMAIN: enzarb.dev
  # GITEA_URL and GITEA_ADMIN_TOKEN loaded from secret below
  GITEA_URL: ""

giteaSecret:
  name: enzarb-gitea-admin
  tokenKey: token

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

nodeSelector: {}
tolerations: []
affinity: {}
