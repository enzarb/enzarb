apiVersion: apps/v1
kind: Deployment
metadata:
  name: enzarb-operator
  namespace: {{ .Release.Namespace }}
  labels:
    app: enzarb-operator
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: enzarb-operator
  template:
    metadata:
      labels:
        app: enzarb-operator
        app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: operator
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --leader-elect={{ .Values.leaderElection }}
            - --health-probe-bind-address=:8081
          env:
            - name: ENZARB_DOMAIN
              value: {{ .Values.env.ENZARB_DOMAIN | quote }}
            - name: GITEA_URL
              value: {{ .Values.env.GITEA_URL | quote }}
            - name: GITEA_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.giteaSecret.name }}
                  key: {{ .Values.giteaSecret.tokenKey }}
                  optional: true
          ports:
            - name: metrics
              containerPort: 8080
            - name: health
              containerPort: 8081
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
          resources: {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity: {{- toYaml . | nindent 8 }}
      {{- end }}
