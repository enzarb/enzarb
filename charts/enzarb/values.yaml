# NOTE: image.tag is the per-component source of truth. CI advances only the
# tags of components that actually changed in a release; unchanged components
# keep their prior tag, so versions intentionally drift between components.
app:
  replicaCount: 2
  image:
    repository: ghcr.io/enzarb/app
    pullPolicy: IfNotPresent
    tag: "v0.108.0"
  env:
    ORIGIN: https://enzarb.dev
  dbSecret:
    name: enzarb-db-enzarb-app-credentials
    hostKey: host
    portKey: port
    userKey: username
    passwordKey: password
    dbName: enzarb
  oidc:
    issuerURL: https://auth.enzarb.dev
    clientID: enzarb-app
    secret:
      name: enzarb-oidc
      clientSecretKey: clientSecret
  jwt:
    secret:
      name: enzarb-jwt
      privateKeyKey: privateKey
      publicKeyKey: publicKey
  encryptionSecret:
    name: enzarb-encryption
    key: encryptionKey
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1
      memory: 512Mi
operator:
  replicaCount: 1
  image:
    repository: ghcr.io/enzarb/operator
    pullPolicy: IfNotPresent
    tag: "v0.105.2"
  leaderElection: true
  env:
    ENZARB_DOMAIN: enzarb.dev
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
billing:
  image:
    repository: ghcr.io/enzarb/billing
    pullPolicy: IfNotPresent
    tag: "v0.94.0"
  # Billing rates and free-tier allowances are configured at runtime via the
  # admin settings page (stored in the app_settings DB table), not here.
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 128Mi
metering:
  image:
    repository: ghcr.io/enzarb/metering
    pullPolicy: IfNotPresent
    tag: "v0.103.3"
  hubbleLogPath: /var/run/cilium/hubble/events.log
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 128Mi
# authd mints scoped registry tokens (Docker token-auth). It validates workspace
# ServiceAccount tokens via TokenReview.
authd:
  image:
    repository: ghcr.io/enzarb/authd
    pullPolicy: IfNotPresent
    tag: "v0.94.0"
  # Secret holding the RSA token-signing keypair (tls.crt/tls.key). The same
  # cert is mounted into Zot as its bearer-auth trust anchor. Create with:
  #   openssl req -x509 -newkey rsa:2048 -nodes -keyout tls.key -out tls.crt \
  #     -subj "/CN=registry-token" -days 3650
  #   kubectl -n enzarb-system create secret tls registry-token-signing \
  #     --cert=tls.crt --key=tls.key
  signingSecret: registry-token-signing
  # Shared secret the app presents (basic auth user "admin") for UI listing.
  adminSecret:
    name: enzarb-registry-admin
    key: token
  # Require each workspace token to be used only from the pod it was issued to
  # (request source IP must match the bound pod's IP). Defeats reuse of an
  # exfiltrated token from outside the cluster or another pod.
  podIPBinding: true
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 96Mi
webhook:
  image:
    repository: ghcr.io/enzarb/webhook
    pullPolicy: IfNotPresent
    tag: "v0.94.0"
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 64Mi
# Transparent pull-through cache for public registries, used by every
# workspace buildkitd via mirror entries in buildkitd.toml. Fails open:
# buildkit falls back to the real upstream if the mirror is down or full.
registryMirror:
  enabled: true
  image:
    repository: ghcr.io/enzarb/mirror
    pullPolicy: IfNotPresent
    tag: "v0.94.0"
  # PVC size (the hard cap on disk).
  cacheSize: 50Gi
  # LRU eviction threshold; keep below cacheSize so eviction finishes before
  # the filesystem fills.
  maxBytes: 45Gi
  # "" uses the cluster default StorageClass.
  storageClass: ""
  # How long a manifest fetched by tag is served without revalidating upstream.
  tagTtl: 60s
  # Registries the mirror will proxy; anything else is 404.
  upstreams:
    - registry-1.docker.io
    - ghcr.io
    - quay.io
    - registry.k8s.io
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      memory: 256Mi
# Answers every A query with the deploy gateway's in-cluster IP, so
# cert-manager's ACME HTTP-01 self-check (pointed here via
# deploy/system/cert-manager.yaml's config.acmeHTTP01Config.solverNameservers)
# can reach it directly instead of hairpinning back through the router's
# public IP, which this network doesn't support. Works for any customer
# custom domain with no per-domain DNS setup.
acmeSelfcheckResolver:
  enabled: true
  image:
    repository: coredns/coredns
    pullPolicy: IfNotPresent
    tag: "1.13.1"
  replicaCount: 2
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 64Mi
# workspace is not a Deployment in this chart; its tag is injected into the
# operator as WORKSPACE_IMAGE and used as the image for project pods.
workspace:
  image:
    repository: ghcr.io/enzarb/workspace
    tag: "v0.108.0"
  # StorageClass for project home PVCs. Empty uses the cluster's default class.
  storageClass: ""
  # nodeSelector applied to every workspace pod (merged with the GPU selector
  # when a project has GPUEnabled). Empty means no constraint. The workspace
  # image bundles a Bun-compiled binary (claude CLI) that segfaults on CPUs
  # without AVX2, so clusters with older nodes should label the capable ones
  # (e.g. `kubectl label node <name> enzarb.io/avx2=true`) and set:
  #   nodeSelector:
  #     enzarb.io/avx2: "true"
  nodeSelector: {}
  # changelog is shown in the UI when a workspace update is pending. Set by CI
  # to the release notes for the current workspace image version.
  changelog: ""
  # changelogs is a map of workspace image version tag → workspace-scoped changelog
  # for that release. The operator uses this to show only the changes between the
  # user's running version and the desired version. Populated by CI on workspace builds.
  changelogs: {"v0.108.0": "v0.108.0 (2026-07-13):\n- fix(agent): list historical Claude sessions on legacy workspaces (87b6fc4)\n- feat(agent): archive/restore agent sessions instead of only deleting (9fe6f73)", "v0.107.0": "v0.107.0 (2026-07-13):\n- feat(agent): support multiple ACP agent providers (Claude, Gemini, Copilot, Codex, OpenCode) (5cf3149)", "v0.106.0": "v0.106.0 (2026-07-13):\n- feat(agent): surface usage/cost, stop reason, timestamps, and slash commands in agent sessions (0c04058)", "v0.105.0": "v0.105.0 (2026-07-12):\n- feat(app): cross-project tiling, richer agent step detail, design-system cleanup (4a70ab5)", "v0.103.0": "v0.103.0 (2026-07-10):\n- feat(agent): show running shell command on pending/running tool calls (88d3608)", "v0.98.6": "v0.98.6 (2026-07-08):\n- fix(agent,app): show file path on read/write tool calls, render output as markdown (12dfc38)", "v0.98.2": "v0.98.2 (2026-07-07):\n- fix(agent): stop stuck permission prompts from wedging the ACP connection (cfa1eb6)", "v0.98.1": "v0.98.1 (2026-07-07):\n- fix(agent): auto-respawn dead ACP connection (28f78c0)", "v0.95.0": "v0.95.0 (2026-07-07):\n- feat(agent,app): surface the model's thinking output in the agent timeline (c46dd0b)", "v0.92.0": "v0.92.0 (2026-07-06):\n- feat(agent,app): stop button for agent turns, full-page tiling mode (2bcd887)"}
database:
  clusterName: enzarb-db
  roles:
    - enzarb-app
    - dex
  databases:
    - name: enzarb
      owner: enzarb-app
    - name: dex
      owner: dex
gateway:
  className: envoy
  # Namespace where Envoy Gateway runs its data-plane proxy pods. Deploy-namespace
  # NetworkPolicies admit ingress from here so routed traffic (and the ACME
  # HTTP-01 self-check) can reach workloads.
  namespace: envoy-gateway-system
  domain: enzarb.dev
  # DNS zone for environment serving hosts (<random>.<deployDomain>). A single
  # wildcard *.<deployDomain> must point at the gateway. Defaults to env.<domain>.
  deployDomain: env.enzarb.dev
  # ValidatingAdmissionPolicy that restricts tenant-authored route/ingress
  # hostnames to their project's AllowedDomains. Requires K8s 1.30+ (VAP GA).
  domainPolicy:
    enabled: true
  loadBalancerIP: "192.168.33.83"
  # This cluster sits behind a router that NATs a public IP to loadBalancerIP
  # with no hairpinning support, so pods can't reach publicIP directly. Set as
  # spec.externalIPs on the envoy Service (see gateway.yaml's envoyService
  # patch) so it's discoverable from the K8s API — the operator reads it from
  # there (gatewayPublicIPs in environment_controller.go) rather than a second
  # copy — to confirm a custom domain's public DNS actually points at us
  # before requesting its certificate.
  publicIP: "104.52.87.66"
  issuer:
    email: support@enzarb.dev
    acmeServer: https://acme-v02.api.letsencrypt.org/directory
imagePullSecrets: []
serviceAccountName:
  app: enzarb-app
  operator: enzarb-operator
nodeSelector: {}
tolerations: []
affinity: {}
# NetworkPolicies applied to org (workspace) namespaces and deploy namespaces.
# podCIDR/serviceCIDR are used to allow internet egress while blocking
# cross-namespace cluster traffic. Defaults match K3s; adjust for your cluster.
networkPolicy:
  enabled: true
  # Pod IP range used by this cluster (kubectl cluster-info dump | grep podCIDR).
  podCIDR: "10.42.0.0/16"
  # Service ClusterIP range (kube-apiserver --service-cluster-ip-range).
  serviceCIDR: "10.43.0.0/16"
# GitHub OAuth App — set oauthEnabled: true and create the enzarb-github-oauth
# K8s secret with keys clientId and clientSecret to enable GitHub integration.
github:
  oauthEnabled: false
