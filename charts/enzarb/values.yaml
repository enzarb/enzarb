# NOTE: image.tag is the per-component source of truth. CI advances only the
# tags of components that actually changed in a release; unchanged components
# keep their prior tag, so versions intentionally drift between components.
app:
  replicaCount: 2
  image:
    repository: ghcr.io/enzarb/app
    pullPolicy: IfNotPresent
    tag: "v0.8.6"
  env:
    ORIGIN: https://enzarb.dev
  dbSecret:
    name: enzarb-db-enzarb-app-credentials
    hostKey: host
    portKey: port
    userKey: username
    passwordKey: password
    dbName: enzarb
  oidc:
    issuerURL: https://auth.enzarb.dev
    clientID: enzarb-app
    secret:
      name: enzarb-oidc
      clientSecretKey: clientSecret
  jwt:
    secret:
      name: enzarb-jwt
      privateKeyKey: privateKey
      publicKeyKey: publicKey
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1
      memory: 512Mi
operator:
  replicaCount: 1
  image:
    repository: ghcr.io/enzarb/operator
    pullPolicy: IfNotPresent
    tag: "v0.8.8"
  leaderElection: true
  env:
    ENZARB_DOMAIN: enzarb.dev
    GITEA_URL: http://gitea-http.enzarb-system.svc.cluster.local:3000
  giteaSecret:
    name: enzarb-gitea-admin
    tokenKey: token
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
billing:
  image:
    repository: ghcr.io/enzarb/billing
    pullPolicy: IfNotPresent
    tag: "v0.8.3"
  pricing:
    cpuSecondsPerUnit: "0.0000139"
    memGiBSecondsPerUnit: "0.0000028"
    netIngressPerByte: "0.0000000001"
    netEgressPerByte: "0.0000000009"
    storageGiBSecondsPerUnit: "0.0000000385"
    freeCPUSeconds: "36000"
    freeMemGiBSeconds: "107374182"
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 128Mi
metering:
  image:
    repository: ghcr.io/enzarb/metering
    pullPolicy: IfNotPresent
    tag: "v0.8.3"
  hubbleLogPath: /var/run/cilium/hubble/events.log
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 128Mi
# workspace is not a Deployment in this chart; its tag is injected into the
# operator as WORKSPACE_IMAGE and used as the image for project pods.
workspace:
  image:
    repository: ghcr.io/enzarb/workspace
    tag: "v0.8.8"
database:
  clusterName: enzarb-db
  roles:
    - enzarb-app
    - gitea
    - dex
  databases:
    - name: enzarb
      owner: enzarb-app
    - name: gitea
      owner: gitea
    - name: dex
      owner: dex
gateway:
  className: envoy
  domain: enzarb.dev
  loadBalancerIP: "192.168.23.93"
  issuer:
    email: curtis.ruck@gmail.com
    acmeServer: https://acme-v02.api.letsencrypt.org/directory
imagePullSecrets: []
serviceAccountName:
  app: enzarb-app
  operator: enzarb-operator
nodeSelector: {}
tolerations: []
affinity: {}
