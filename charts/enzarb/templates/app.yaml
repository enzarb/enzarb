apiVersion: apps/v1
kind: Deployment
metadata:
  name: enzarb-app
  namespace: {{ .Release.Namespace }}
  labels:
    app: enzarb-app
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
spec:
  replicas: {{ .Values.app.replicaCount }}
  selector:
    matchLabels:
      app: enzarb-app
  template:
    metadata:
      labels:
        app: enzarb-app
        app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    spec:
      serviceAccountName: {{ .Values.serviceAccountName.app }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          image: "{{ .Values.app.image.repository }}:{{ .Values.app.image.tag }}"
          imagePullPolicy: {{ .Values.app.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: ORIGIN
              value: {{ .Values.app.env.ORIGIN | quote }}
            - name: GITEA_URL
              value: {{ .Values.app.env.GITEA_URL | quote }}
            - name: GITEA_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.operator.giteaSecret.name }}
                  key: {{ .Values.operator.giteaSecret.tokenKey }}
                  optional: true
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.app.dbSecret.name }}
                  key: {{ .Values.app.dbSecret.hostKey }}
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.app.dbSecret.name }}
                  key: {{ .Values.app.dbSecret.portKey }}
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.app.dbSecret.name }}
                  key: {{ .Values.app.dbSecret.userKey }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.app.dbSecret.name }}
                  key: {{ .Values.app.dbSecret.passwordKey }}
            - name: DATABASE_URL
              value: "postgres://$(DB_USER):$(DB_PASSWORD)@$(DB_HOST):$(DB_PORT)/{{ .Values.app.dbSecret.dbName }}"
            - name: OIDC_ISSUER_URL
              value: {{ .Values.app.oidc.issuerURL | quote }}
            - name: OIDC_CLIENT_ID
              value: {{ .Values.app.oidc.clientID | quote }}
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.app.oidc.secret.name }}
                  key: {{ .Values.app.oidc.secret.clientSecretKey }}
            - name: JWT_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.app.jwt.secret.name }}
                  key: {{ .Values.app.jwt.secret.privateKeyKey }}
            - name: JWT_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.app.jwt.secret.name }}
                  key: {{ .Values.app.jwt.secret.publicKeyKey }}
            # Registry access goes through authd: the app authenticates as the
            # "admin" client (shared secret) to mint scoped Zot tokens.
            - name: AUTHD_INTERNAL_URL
              value: "http://enzarb-authd.{{ .Release.Namespace }}:8080"
            - name: REGISTRY_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.authd.adminSecret.name }}
                  key: {{ .Values.authd.adminSecret.key }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources: {{- toYaml .Values.app.resources | nindent 12 }}
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
      {{- with .Values.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity: {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccountName.app }}
  namespace: {{ .Release.Namespace }}
---
apiVersion: v1
kind: Service
metadata:
  name: enzarb-app
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: enzarb-app
  ports:
    - name: http
      port: 3000
      targetPort: http
