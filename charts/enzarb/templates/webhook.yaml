apiVersion: apps/v1
kind: Deployment
metadata:
  name: enzarb-webhook
  namespace: {{ .Release.Namespace }}
  labels:
    app: enzarb-webhook
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: enzarb-webhook
  template:
    metadata:
      labels:
        app: enzarb-webhook
        app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    spec:
      serviceAccountName: enzarb-webhook
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: webhook
          image: "{{ .Values.webhook.image.repository }}:{{ .Values.webhook.image.tag }}"
          imagePullPolicy: {{ .Values.webhook.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          env:
            - name: LISTEN_ADDR
              value: ":8080"
            - name: GITHUB_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: enzarb-github-webhook
                  key: secret
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          resources: {{- toYaml .Values.webhook.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: enzarb-webhook
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: enzarb-webhook
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: enzarb-webhook
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: enzarb-webhook
rules:
  - apiGroups: ["helm.cattle.io"]
    resources: ["helmcharts"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: enzarb-webhook
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: enzarb-webhook
subjects:
  - kind: ServiceAccount
    name: enzarb-webhook
    namespace: {{ .Release.Namespace }}
