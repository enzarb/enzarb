apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: enzarb
  namespace: {{ .Release.Namespace }}
spec:
  # Merge all Gateways using the "envoy" GatewayClass into a single Envoy data
  # plane (one Deployment, one LoadBalancer IP). This lets every project run its
  # own per-namespace Gateway (enzarb-deploy) — whose HTTPS listeners reference
  # TLS secrets living in that same deploy namespace — without each Gateway
  # demanding its own IP. mergeGateways MUST be set on the EnvoyProxy referenced
  # by the GatewayClass parametersRef (below), not per-Gateway.
  mergeGateways: true
  provider:
    type: Kubernetes
    kubernetes:
      envoyService:
        annotations:
          io.cilium/lb-ipam-ips: {{ .Values.gateway.loadBalancerIP | quote }}
        externalTrafficPolicy: Cluster
---
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: {{ .Values.gateway.className }}
  # Adopt the GatewayClass if it already exists in-cluster (it predates this
  # chart managing it). Without these, Helm refuses to take ownership.
  annotations:
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: Helm
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
  parametersRef:
    group: gateway.envoyproxy.io
    kind: EnvoyProxy
    name: enzarb
    namespace: {{ .Release.Namespace }}
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: letsencrypt
  namespace: {{ .Release.Namespace }}
spec:
  acme:
    server: {{ .Values.gateway.issuer.acmeServer }}
    email: {{ .Values.gateway.issuer.email }}
    privateKeySecretRef:
      name: letsencrypt-account-key
    solvers:
      - http01:
          gatewayHTTPRoute:
            parentRefs:
              - name: enzarb
                namespace: {{ .Release.Namespace }}
                kind: Gateway
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: enzarb
  namespace: {{ .Release.Namespace }}
  annotations:
    cert-manager.io/issuer: letsencrypt
spec:
  # EnvoyProxy is attached at the GatewayClass level (parametersRef) because
  # mergeGateways requires it there; no per-Gateway infrastructure block.
  gatewayClassName: {{ .Values.gateway.className }}
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
    - name: https
      port: 443
      protocol: HTTPS
      hostname: {{ .Values.gateway.domain | quote }}
      tls:
        mode: Terminate
        certificateRefs:
          - name: enzarb-tls
      allowedRoutes:
        namespaces:
          from: Same
    - name: https-auth
      port: 443
      protocol: HTTPS
      hostname: {{ printf "auth.%s" .Values.gateway.domain | quote }}
      tls:
        mode: Terminate
        certificateRefs:
          - name: enzarb-auth-tls
      allowedRoutes:
        namespaces:
          from: Same
    - name: https-registry
      port: 443
      protocol: HTTPS
      hostname: {{ printf "registry.%s" .Values.gateway.domain | quote }}
      tls:
        mode: Terminate
        certificateRefs:
          - name: enzarb-registry-tls
      allowedRoutes:
        namespaces:
          from: Same
---
# Path-specific rules must live in the same HTTPRoute as the catch-all so
# Envoy sees them as an ordered rule list rather than competing HTTPRoutes.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: enzarb-app
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: enzarb
      sectionName: https
  hostnames:
    - {{ .Values.gateway.domain | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /github-webhook
      backendRefs:
        - name: enzarb-webhook
          port: 8080
    - backendRefs:
        - name: enzarb-app
          port: 3000
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: enzarb-app-redirect
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: enzarb
      sectionName: http
  hostnames:
    - {{ .Values.gateway.domain | quote }}
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: enzarb-auth
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: enzarb
      sectionName: https-auth
  hostnames:
    - {{ printf "auth.%s" .Values.gateway.domain | quote }}
  rules:
    - backendRefs:
        - name: dex
          port: 5556
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: enzarb-auth-redirect
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: enzarb
      sectionName: http
  hostnames:
    - {{ printf "auth.%s" .Values.gateway.domain | quote }}
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
---
# Registry token endpoint (Docker token-auth) → authd. Must precede the catch-all
# Zot route so /auth/token is not proxied to the registry.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: enzarb-registry
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: enzarb
      sectionName: https-registry
  hostnames:
    - {{ printf "registry.%s" .Values.gateway.domain | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /auth/token
      backendRefs:
        - name: enzarb-authd
          port: 8080
    - backendRefs:
        - name: zot
          port: 5000
