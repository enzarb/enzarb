# Defense-in-depth: every object the operator creates (Deployments, Gateways,
# Issuers, the mirrored enzarb-deployer Role/RoleBinding, etc.) carries
# app.kubernetes.io/managed-by=enzarb-operator. enzarb-deployer intentionally
# grants tenants write access to several of those resource kinds so they can
# manage their *own* objects of the same kind (e.g. their own Role, their own
# Secret) — but nothing should let a tenant UPDATE or DELETE an object the
# operator itself owns, since that's how a workspace pod could tamper with
# operator-managed state (this closed the hole where a tenant could edit the
# operator's own NetworkPolicy before networkpolicies was removed from
# enzarb-deployer entirely; see rbac.yaml). Applies regardless of resource
# kind, so it also covers any future enzarb-deployer grant.
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: enzarb-protect-operator-managed
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["UPDATE", "DELETE"]
        resources: ["services", "configmaps", "secrets", "persistentvolumeclaims", "serviceaccounts"]
      - apiGroups: ["apps"]
        apiVersions: ["v1"]
        operations: ["UPDATE", "DELETE"]
        resources: ["deployments", "statefulsets", "replicasets"]
      - apiGroups: ["gateway.networking.k8s.io"]
        apiVersions: ["v1", "v1beta1"]
        operations: ["UPDATE", "DELETE"]
        resources: ["httproutes", "grpcroutes", "gateways"]
      - apiGroups: ["cert-manager.io"]
        apiVersions: ["v1"]
        operations: ["UPDATE", "DELETE"]
        resources: ["certificates", "certificaterequests", "issuers"]
      - apiGroups: ["networking.k8s.io"]
        apiVersions: ["v1"]
        operations: ["UPDATE", "DELETE"]
        resources: ["networkpolicies"]
      - apiGroups: ["pgop.ruck.io"]
        apiVersions: ["v1alpha1"]
        operations: ["UPDATE", "DELETE"]
        resources: ["clusters", "roles", "databases"]
      - apiGroups: ["helm.cattle.io"]
        apiVersions: ["v1"]
        operations: ["UPDATE", "DELETE"]
        resources: ["helmcharts", "helmchartconfigs"]
      - apiGroups: ["batch"]
        apiVersions: ["v1"]
        operations: ["UPDATE", "DELETE"]
        resources: ["jobs", "cronjobs"]
      - apiGroups: ["rbac.authorization.k8s.io"]
        apiVersions: ["v1"]
        operations: ["UPDATE", "DELETE"]
        resources: ["roles", "rolebindings"]
  variables:
    - name: isOperatorManaged
      expression: >-
        has(oldObject.metadata.labels) &&
        'app.kubernetes.io/managed-by' in oldObject.metadata.labels &&
        oldObject.metadata.labels['app.kubernetes.io/managed-by'] == 'enzarb-operator'
    - name: isOperator
      expression: >-
        request.userInfo.username == 'system:serviceaccount:{{ .Release.Namespace }}:{{ .Values.serviceAccountName.operator }}'
    - name: isAdmin
      # system:admin is the cluster operator's own break-glass identity, not
      # a tenant's — exempt it from this policy entirely rather than
      # resource-by-resource (previously scoped to just deployments, to let
      # system:admin force-restart a workspace Deployment).
      expression: >-
        request.userInfo.username == 'system:admin'
    - name: isReplicaSetController
      # The built-in Deployment/ReplicaSet controllers must UPDATE (scale old
      # RS to 0 during a Recreate rollout) and DELETE (revisionHistoryLimit
      # garbage collection) the ReplicaSets a Deployment owns — as their own
      # in-cluster identity, not the operator's or system:admin's. Without
      # this, protecting replicasets here silently blocks every rollout of
      # an operator-managed Deployment: spec changes never take effect and
      # old ReplicaSets pile up ungarbage-collected.
      expression: >-
        request.resource.resource == 'replicasets' &&
        request.userInfo.username in [
          'system:serviceaccount:kube-system:replicaset-controller',
          'system:serviceaccount:kube-system:deployment-controller'
        ]
  validations:
    - expression: "!variables.isOperatorManaged || variables.isOperator || variables.isAdmin || variables.isReplicaSetController"
      reason: Forbidden
      message: "This resource is managed by the enzarb operator and cannot be modified or deleted directly."
---
# Applies in project org namespaces (user-<orgId>).
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: enzarb-protect-operator-managed-org
spec:
  policyName: enzarb-protect-operator-managed
  validationActions: ["Deny"]
  matchResources:
    namespaceSelector:
      matchExpressions:
        - key: enzarb.io/org-id
          operator: Exists
---
# Applies in per-Environment deploy namespaces.
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: enzarb-protect-operator-managed-deploy
spec:
  policyName: enzarb-protect-operator-managed
  validationActions: ["Deny"]
  matchResources:
    namespaceSelector:
      matchLabels:
        enzarb.io/type: deploy
