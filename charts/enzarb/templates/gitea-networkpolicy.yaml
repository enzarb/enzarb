{{- if .Values.gitea.networkPolicy.enabled }}
# Restrict ingress to Gitea so only the platform namespace (operator/app admin
# API, internal) and the Envoy gateway (workspace git over HTTPS, gated by authd
# extAuth) can reach it. Without this, any pod could hit gitea-http:3000 directly
# and forge the trusted X-Gitea-User header to impersonate a project.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: enzarb-gitea-ingress
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      {{- toYaml .Values.gitea.networkPolicy.podSelector | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    # Platform components in this namespace (operator, app, authd, …).
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Release.Namespace }}
    # The Envoy gateway data plane (terminates gitea.<domain>, applies extAuth).
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.gitea.networkPolicy.gatewayNamespace }}
{{- end }}
