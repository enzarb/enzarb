apiVersion: apps/v1
kind: Deployment
metadata:
  name: enzarb-operator
  namespace: {{ .Release.Namespace }}
  labels:
    app: enzarb-operator
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
spec:
  replicas: {{ .Values.operator.replicaCount }}
  selector:
    matchLabels:
      app: enzarb-operator
  template:
    metadata:
      labels:
        app: enzarb-operator
        app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    spec:
      serviceAccountName: {{ .Values.serviceAccountName.operator }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: operator
          image: "{{ .Values.operator.image.repository }}:{{ .Values.operator.image.tag }}"
          imagePullPolicy: {{ .Values.operator.image.pullPolicy }}
          args:
            - --leader-elect={{ .Values.operator.leaderElection }}
            - --health-probe-bind-address=:8081
          env:
            - name: WORKSPACE_IMAGE
              value: "{{ .Values.workspace.image.repository }}:{{ .Values.workspace.image.tag }}"
            - name: WORKSPACE_CHANGELOG
              value: {{ .Values.workspace.changelog | quote }}
            - name: WORKSPACE_CHANGELOGS
              value: {{ .Values.workspace.changelogs | toJson | quote }}
            {{- with .Values.workspace.storageClass }}
            - name: WORKSPACE_STORAGE_CLASS
              value: {{ . | quote }}
            {{- end }}
            - name: ENZARB_DOMAIN
              value: {{ .Values.operator.env.ENZARB_DOMAIN | quote }}
            - name: BASE_DOMAIN
              value: {{ .Values.gateway.domain | quote }}
            - name: DEPLOY_DOMAIN
              value: {{ .Values.gateway.deployDomain | default (printf "env.%s" .Values.gateway.domain) | quote }}
            - name: ACME_SERVER
              value: {{ .Values.gateway.issuer.acmeServer | quote }}
            - name: ACME_EMAIL
              value: {{ .Values.gateway.issuer.email | quote }}
            - name: GATEWAY_CLASS_NAME
              value: {{ .Values.gateway.className | quote }}
            - name: GATEWAY_NAMESPACE
              value: {{ .Values.gateway.namespace | quote }}
            # System namespace admitted to workspace agent ports by the
            # workspace-isolation NetworkPolicy (operator process checks).
            - name: SYSTEM_NAMESPACE
              value: {{ .Release.Namespace | quote }}
            - name: NETWORK_POLICY_ENABLED
              value: {{ .Values.networkPolicy.enabled | quote }}
            - name: CLUSTER_POD_CIDR
              value: {{ .Values.networkPolicy.podCIDR | quote }}
            - name: CLUSTER_SVC_CIDR
              value: {{ .Values.networkPolicy.serviceCIDR | quote }}
            - name: MIRROR_ENABLED
              value: {{ .Values.registryMirror.enabled | quote }}
            - name: MIRROR_HOST
              value: "enzarb-mirror.{{ .Release.Namespace }}.svc.cluster.local:5000"
          ports:
            - name: metrics
              containerPort: 8080
            - name: health
              containerPort: 8081
            - name: webhook
              containerPort: 9443
          volumeMounts:
            - name: webhook-certs
              mountPath: /tmp/k8s-webhook-server/serving-certs
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          resources: {{- toYaml .Values.operator.resources | nindent 12 }}
      volumes:
        - name: webhook-certs
          secret:
            secretName: enzarb-operator-webhook-cert
      {{- with .Values.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity: {{- toYaml . | nindent 8 }}
      {{- end }}
---
# Serving cert for the pod-proxy mutating webhook. A self-signed Issuer backs a
# Certificate whose Secret is mounted into the operator; cert-manager's
# ca-injector copies the CA into the MutatingWebhookConfiguration caBundle.
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: enzarb-operator-webhook-selfsign
  namespace: {{ .Release.Namespace }}
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: enzarb-operator-webhook-cert
  namespace: {{ .Release.Namespace }}
spec:
  secretName: enzarb-operator-webhook-cert
  dnsNames:
    - enzarb-operator-webhook.{{ .Release.Namespace }}.svc
    - enzarb-operator-webhook.{{ .Release.Namespace }}.svc.cluster.local
  issuerRef:
    name: enzarb-operator-webhook-selfsign
    kind: Issuer
---
apiVersion: v1
kind: Service
metadata:
  name: enzarb-operator-webhook
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: enzarb-operator
  ports:
    - name: webhook
      port: 443
      targetPort: webhook
---
# Routes every pod created in a deploy namespace (enzarb.io/type=deploy) through
# capsule-proxy for Kubernetes API access. failurePolicy: Fail — a pod that
# escapes this mutation would reach the API server directly, defeating tenant
# isolation, so pod creation is blocked rather than allowed unmutated.
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: enzarb-pod-proxy
  annotations:
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/enzarb-operator-webhook-cert
webhooks:
  - name: pod-proxy.enzarb.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail
    reinvocationPolicy: IfNeeded
    namespaceSelector:
      matchLabels:
        enzarb.io/type: deploy
    clientConfig:
      service:
        name: enzarb-operator-webhook
        namespace: {{ .Release.Namespace }}
        path: /mutate-v1-pod-proxy
        port: 443
    rules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE"]
        resources: ["pods"]
        scope: Namespaced
