apiVersion: apps/v1
kind: Deployment
metadata:
  name: enzarb-operator
  namespace: {{ .Release.Namespace }}
  labels:
    app: enzarb-operator
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
spec:
  replicas: {{ .Values.operator.replicaCount }}
  selector:
    matchLabels:
      app: enzarb-operator
  template:
    metadata:
      labels:
        app: enzarb-operator
        app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    spec:
      serviceAccountName: {{ .Values.serviceAccountName.operator }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: operator
          image: "{{ .Values.operator.image.repository }}:{{ .Values.operator.image.tag }}"
          imagePullPolicy: {{ .Values.operator.image.pullPolicy }}
          args:
            - --leader-elect={{ .Values.operator.leaderElection }}
            - --health-probe-bind-address=:8081
          env:
            - name: WORKSPACE_IMAGE
              value: "{{ .Values.workspace.image.repository }}:{{ .Values.workspace.image.tag }}"
            {{- with .Values.workspace.storageClass }}
            - name: WORKSPACE_STORAGE_CLASS
              value: {{ . | quote }}
            {{- end }}
            - name: ENZARB_DOMAIN
              value: {{ .Values.operator.env.ENZARB_DOMAIN | quote }}
            - name: BASE_DOMAIN
              value: {{ .Values.gateway.domain | quote }}
            - name: ACME_SERVER
              value: {{ .Values.gateway.issuer.acmeServer | quote }}
            - name: ACME_EMAIL
              value: {{ .Values.gateway.issuer.email | quote }}
            - name: GATEWAY_NAME
              value: "enzarb"
            - name: GATEWAY_NAMESPACE
              value: {{ .Release.Namespace | quote }}
            - name: GITEA_URL
              value: {{ .Values.operator.env.GITEA_URL | quote }}
            - name: GITEA_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.operator.giteaSecret.name }}
                  key: {{ .Values.operator.giteaSecret.tokenKey }}
                  optional: true
          ports:
            - name: metrics
              containerPort: 8080
            - name: health
              containerPort: 8081
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          resources: {{- toYaml .Values.operator.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity: {{- toYaml . | nindent 8 }}
      {{- end }}
