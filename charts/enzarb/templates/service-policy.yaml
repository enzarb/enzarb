{{- if .Values.gateway.domainPolicy.enabled }}
# Block Services in tenant deploy namespaces from using NodePort, LoadBalancer,
# or externalIPs — only ClusterIP is permitted, keeping services namespace-local.
# ExternalName is also blocked as it can redirect to arbitrary hosts.
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: enzarb-restrict-service-type
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["services"]
  matchConditions:
    # cert-manager HTTP-01 GatewayHTTPRoute solver creates a temporary NodePort
    # service to serve the ACME challenge. Allow it — the HTTPRoute (not the
    # NodePort) is what routes external traffic; the NodePort port is unused.
    - name: not-acme-solver
      expression: >-
        !(has(object.metadata.labels) &&
          'acme.cert-manager.io/http01-solver' in object.metadata.labels)
  validations:
    - expression: >-
        !has(object.spec.type) ||
        object.spec.type == 'ClusterIP'
      reason: Forbidden
      messageExpression: >-
        'Services in deploy namespaces must use type ClusterIP (got: ' +
        (has(object.spec.type) ? object.spec.type : 'ClusterIP') + ')'
    - expression: >-
        !has(object.spec.externalIPs) || object.spec.externalIPs.size() == 0
      reason: Forbidden
      messageExpression: "'Services may not set externalIPs'"
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: enzarb-restrict-service-type
spec:
  policyName: enzarb-restrict-service-type
  validationActions: ["Deny"]
  matchResources:
    namespaceSelector:
      matchLabels:
        enzarb.io/type: deploy
{{- end }}
