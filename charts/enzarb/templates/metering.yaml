apiVersion: apps/v1
kind: Deployment
metadata:
  name: enzarb-metering
  namespace: {{ .Release.Namespace }}
  labels:
    app: enzarb-metering
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: enzarb-metering
  template:
    metadata:
      labels:
        app: enzarb-metering
        app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    spec:
      serviceAccountName: enzarb-metering
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: metering
          image: "{{ .Values.metering.image.repository }}:{{ .Values.metering.image.tag }}"
          imagePullPolicy: {{ .Values.metering.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.app.dbSecret.name }}
                  key: {{ .Values.app.dbSecret.hostKey }}
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.app.dbSecret.name }}
                  key: {{ .Values.app.dbSecret.portKey }}
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.app.dbSecret.name }}
                  key: {{ .Values.app.dbSecret.userKey }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.app.dbSecret.name }}
                  key: {{ .Values.app.dbSecret.passwordKey }}
            - name: DATABASE_URL
              value: "postgres://$(DB_USER):$(DB_PASSWORD)@$(DB_HOST):$(DB_PORT)/{{ .Values.app.dbSecret.dbName }}"
            - name: HUBBLE_LOG_PATH
              value: {{ .Values.metering.hubbleLogPath | quote }}
          volumeMounts:
            - name: hubble-log
              mountPath: /var/run/cilium/hubble
              readOnly: true
          resources: {{- toYaml .Values.metering.resources | nindent 12 }}
      volumes:
        - name: hubble-log
          hostPath:
            path: /var/run/cilium/hubble
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: enzarb-metering
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: enzarb-metering
rules:
  - apiGroups: [""]
    resources: ["namespaces", "pods", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: enzarb-metering
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: enzarb-metering
subjects:
  - kind: ServiceAccount
    name: enzarb-metering
    namespace: {{ .Release.Namespace }}
