apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccountName.operator }}
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: enzarb-app
rules:
  - apiGroups: ["enzarb.io"]
    resources: ["projects", "environments", "organizations"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["enzarb.io"]
    resources: ["projects/status", "environments/status", "organizations/status"]
    verbs: ["get"]
  - apiGroups: ["enzarb.io"]
    resources: ["domainclaims"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["namespaces", "pods"]
    verbs: ["get", "list", "watch"]
  # Read-only: getGatewayPublicIPs (src/lib/k8s.ts) lists the envoy Service by
  # label to read its spec.externalIPs, so the UI can show custom-domain A
  # record instructions without a second hardcoded copy of the public IP.
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["enzarb-config"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: enzarb-app
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: enzarb-app
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccountName.app }}
    namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: enzarb-operator
rules:
  - apiGroups: ["enzarb.io"]
    resources: ["projects", "environments", "organizations", "alloweddomains", "domainclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["enzarb.io"]
    resources: ["projects/status", "environments/status", "organizations/status", "domainclaims/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["enzarb.io"]
    resources: ["organizations/finalizers"]
    verbs: ["update"]
  - apiGroups: [""]
    resources: ["namespaces", "serviceaccounts", "services", "persistentvolumeclaims", "configmaps", "pods"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # get/watch/create/update/patch here (beyond the delete/list below) exist
  # only so the operator's own permissions cover the enzarb-deployer Role it
  # mirrors into each deploy namespace (see ensureDeployerRole) — Kubernetes'
  # privilege-escalation check requires the creator to directly hold every
  # verb it grants. The operator's own reconcile code never calls get/watch
  # on an arbitrary secret's payload; the one it does read is
  # capsule-proxy-root-secret below, via the resourceNames-scoped rule.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "watch", "create", "update", "patch"]
  # Serving-TLS secret lifecycle: prune stale dtls-* Secrets in enzarb-system
  # and clean up legacy in-namespace ones (cert-manager does not GC a
  # Certificate's Secret).
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["list", "delete"]
  # The one secret the operator may read: capsule-proxy's CA certificate,
  # copied into each workspace's kubeconfig ConfigMap so pods trust the proxy.
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["capsule-proxy-root-secret"]
    verbs: ["get"]
  # Capsule multi-tenancy: one Tenant per Project (drives capsule-proxy's
  # namespace filtering); org SA groups are appended to the
  # CapsuleConfiguration user scope.
  - apiGroups: ["capsule.clastix.io"]
    resources: ["tenants"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["capsule.clastix.io"]
    resources: ["capsuleconfigurations"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Tenant-deployed StatefulSets in an Environment's deploy-* namespace, which
  # the operator doesn't own or create — only paused/resumed for project
  # suspend (see reconcileEnvironmentSuspension). create/delete are granted
  # only so the operator's own permissions cover the enzarb-deployer Role
  # (see the secrets rule above for why); reconcile code never calls them.
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["pods/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["cert-manager.io"]
    resources: ["certificaterequests"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["grpcroutes"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["helm.cattle.io"]
    resources: ["helmcharts", "helmchartconfigs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["pgop.ruck.io"]
    resources: ["clusters", "roles", "databases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["clusterrolebindings", "rolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Per-project ClusterRoles grant each workspace SA `get` on its own
  # environments' deploy namespaces by name (namespaces are cluster-scoped, so
  # a namespaced Role can't express this). Creating them passes the RBAC
  # escalation check because the operator itself holds namespace get above.
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["clusterroles"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # The enzarb-restrict-rolebinding-kind ValidatingAdmissionPolicy forbids
  # RoleBindings from referencing a ClusterRole, so the operator mirrors
  # enzarb-deployer's rules into a namespace-local Role (also named
  # enzarb-deployer) in each deploy namespace and binds to that instead.
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Allow the operator to bind the deployer Role to project ServiceAccounts.
  # Without this, RBAC privilege-escalation prevention blocks the binding
  # because the operator would not itself hold every permission the deployer
  # role grants — which is why the rules above (secrets, statefulsets,
  # replicasets, pods/exec+log+status, jobs/cronjobs, certificaterequests,
  # grpcroutes, helmcharts/helmchartconfigs, pgop) exist: they make the
  # operator's own permission set a superset of enzarb-deployer's, so both
  # this bind and creating/updating the mirrored Role (ensureDeployerRole)
  # pass Kubernetes' privilege-escalation covers-check without needing the
  # broader, unscoped "escalate" verb.
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles"]
    resourceNames: ["enzarb-deployer"]
    verbs: ["bind"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Workspace API-server egress needs a CiliumNetworkPolicy (kube-apiserver
  # entity); plain NetworkPolicy CIDR rules can't match the apiserver identity.
  - apiGroups: ["cilium.io"]
    resources: ["ciliumnetworkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["httproutes", "referencegrants", "gateways"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["cert-manager.io"]
    resources: ["certificates", "issuers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: enzarb-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: enzarb-operator
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccountName.operator }}
    namespace: {{ .Release.Namespace }}
---
# ClusterRole granting project service accounts the ability to deploy into their env namespaces.
# This role is bound per-namespace (RoleBinding in each deploy namespace) so it
# only applies within the tenant's own environment namespace — never cluster-wide.
#
# Excluded intentionally: daemonsets, clusterroles/bindings, clusterissuers,
# nodes, and any resource that could enable privilege escalation or lateral
# movement. Services are restricted to ClusterIP type by the
# enzarb-restrict-service-type ValidatingAdmissionPolicy. Tenants may create
# namespace-scoped ServiceAccounts, Roles, and RoleBindings (see below) to
# sub-delegate a subset of their own permissions to per-component identities;
# Kubernetes' built-in escalation check (no `escalate` verb granted here)
# prevents granting more than they already hold, and the
# enzarb-restrict-rolebinding-kind ValidatingAdmissionPolicy blocks
# RoleBindings from referencing a ClusterRole.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: enzarb-deployer
rules:
  # Pods — CRUD for running workloads; logs for debugging; exec for shelling
  # into a running pod's containers (e.g. `kubectl exec`)
  - apiGroups: [""]
    resources: ["pods", "pods/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  # Services — ClusterIP only; NodePort/LoadBalancer/externalIPs blocked by VAP
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Config and storage
  - apiGroups: [""]
    resources: ["configmaps", "secrets", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Workload controllers — no daemonsets (runs privileged pods on every host)
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "replicasets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Gateway API routing
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["httproutes", "grpcroutes"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Gateway — read-only; the operator manages the namespace Gateway
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gateways"]
    verbs: ["get", "list", "watch"]
  # Certificates — tenants may create Certificates referencing the
  # operator-provisioned Issuer (enzarb-acme); no write on Issuer itself.
  - apiGroups: ["cert-manager.io"]
    resources: ["certificates", "certificaterequests"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Issuer — read-only; tenants can reference it but not modify it
  - apiGroups: ["cert-manager.io"]
    resources: ["issuers"]
    verbs: ["get", "list", "watch"]
  # NetworkPolicies — tenants may manage their own namespace network policies
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # pgop — tenants may manage Postgres clusters, roles, and databases in their env namespace
  - apiGroups: ["pgop.ruck.io"]
    resources: ["clusters", "roles", "databases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # HelmCharts — tenants may deploy Helm releases into their env namespace via K3s HelmChart CRs
  - apiGroups: ["helm.cattle.io"]
    resources: ["helmcharts", "helmchartconfigs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Batch workloads — tenants may schedule Jobs/CronJobs (e.g. for a
  # job-runner component); pod logs for spawned pods are covered by the
  # pods/log rule above.
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # ServiceAccounts — tenants may mint dedicated per-component identities to
  # bind narrower Roles to, instead of reusing the shared project SA. A bare
  # ServiceAccount grants no privileges until bound via a RoleBinding, which
  # is governed by the rule below plus the RoleBinding-kind VAP.
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Namespace-scoped RBAC delegation — tenants may define narrower Roles and
  # bind them to their own ServiceAccounts. Never clusterroles/clusterrolebindings,
  # and no bind/escalate verb, so Kubernetes' native privilege-escalation check
  # always applies.
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
