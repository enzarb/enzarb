apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccountName.operator }}
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: enzarb-app
rules:
  - apiGroups: ["enzarb.io"]
    resources: ["projects", "environments", "organizations"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["enzarb.io"]
    resources: ["projects/status", "environments/status", "organizations/status"]
    verbs: ["get"]
  - apiGroups: ["enzarb.io"]
    resources: ["domainclaims"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["namespaces", "pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["enzarb-config"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: enzarb-app
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: enzarb-app
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccountName.app }}
    namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: enzarb-operator
rules:
  - apiGroups: ["enzarb.io"]
    resources: ["projects", "environments", "organizations", "alloweddomains", "domainclaims", "domainclaims/status", "projects/status", "environments/status", "organizations/status", "organizations/finalizers"]
    verbs: ["*"]
  - apiGroups: [""]
    resources: ["namespaces", "serviceaccounts", "services", "persistentvolumeclaims", "configmaps", "pods"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["clusterrolebindings", "rolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Allow the operator to bind the deployer ClusterRole to project
  # ServiceAccounts. Without this, RBAC privilege-escalation prevention blocks
  # the binding because the operator does not itself hold every permission the
  # deployer role grants (secrets, statefulsets, jobs, ingresses, etc.).
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["clusterroles"]
    resourceNames: ["enzarb-deployer"]
    verbs: ["bind"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["httproutes", "referencegrants", "gateways"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["cert-manager.io"]
    resources: ["certificates", "issuers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: enzarb-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: enzarb-operator
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccountName.operator }}
    namespace: {{ .Release.Namespace }}
---
# ClusterRole granting project service accounts the ability to deploy into their env namespaces.
# This role is bound per-namespace (RoleBinding in each deploy namespace) so it
# only applies within the tenant's own environment namespace — never cluster-wide.
#
# Excluded intentionally: daemonsets, serviceaccounts, clusterroles/bindings,
# clusterissuers, nodes, and any resource that could enable privilege escalation
# or lateral movement. Services are restricted to ClusterIP type by the
# enzarb-restrict-service-type ValidatingAdmissionPolicy.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: enzarb-deployer
rules:
  # Pods — CRUD for running workloads; logs for debugging
  - apiGroups: [""]
    resources: ["pods", "pods/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list", "watch"]
  # Services — ClusterIP only; NodePort/LoadBalancer/externalIPs blocked by VAP
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Config and storage
  - apiGroups: [""]
    resources: ["configmaps", "secrets", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Workload controllers — no daemonsets (runs privileged pods on every host)
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "replicasets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Gateway API routing
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["httproutes", "grpcroutes"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Gateway — read-only; the operator manages the namespace Gateway
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gateways"]
    verbs: ["get", "list", "watch"]
  # Certificates — tenants may create Certificates referencing the
  # operator-provisioned Issuer (enzarb-acme); no write on Issuer itself.
  - apiGroups: ["cert-manager.io"]
    resources: ["certificates", "certificaterequests"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Issuer — read-only; tenants can reference it but not modify it
  - apiGroups: ["cert-manager.io"]
    resources: ["issuers"]
    verbs: ["get", "list", "watch"]
  # NetworkPolicies — tenants may manage their own namespace network policies
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # pgop — tenants may manage Postgres clusters, roles, and databases in their env namespace
  - apiGroups: ["pgop.ruck.io"]
    resources: ["clusters", "roles", "databases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # HelmCharts — tenants may deploy Helm releases into their env namespace via K3s HelmChart CRs
  - apiGroups: ["helm.cattle.io"]
    resources: ["helmcharts", "helmchartconfigs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
