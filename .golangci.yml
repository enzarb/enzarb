version: "2"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - gosec
    - misspell
    - revive
    - unconvert
  settings:
    gosec:
      excludes:
        - G304
    goimports:
      local-prefixes: enzarb.dev/enzarb
    revive:
      rules:
        - name: exported
          disabled: true

issues:
  exclude-rules:
    - path: _test\.go
      linters: [gosec, errcheck]
    - path: operator/internal/admin/cli\.go
      linters: [gosec]

run:
  timeout: 5m
