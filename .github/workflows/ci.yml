name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  REGISTRY: ghcr.io
  ORG: enzarb
  GO_VERSION: "1.26"
  NODE_VERSION: "lts/*"
  RUST_VERSION: stable

jobs:
# ─────────────────────────────────────────────────────────────────────────────
# CHANGES — detect which components changed; drives scoped lint/build + bump set
# ─────────────────────────────────────────────────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.detect.outputs.app }}
      operator: ${{ steps.detect.outputs.operator }}
      metering: ${{ steps.detect.outputs.metering }}
      billing: ${{ steps.detect.outputs.billing }}
      workspace: ${{ steps.detect.outputs.workspace }}
      agent: ${{ steps.detect.outputs.agent }}
      go_any: ${{ steps.detect.outputs.go_any }}
      docker_any: ${{ steps.detect.outputs.docker_any }}
      images_json: ${{ steps.detect.outputs.images_json }}
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0  # full history + tags for diff baseline

      - name: Detect changed components
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          # ── Determine the file set to diff ──────────────────────────────────
          REBUILD_ALL=false
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            FILES=$(git diff --name-only "$BASE" HEAD)
          else
            PREV_TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -1)
            if [ -z "$PREV_TAG" ]; then
              # First release ever — build everything.
              REBUILD_ALL=true
              FILES=""
            else
              FILES=$(git diff --name-only "${PREV_TAG}..HEAD")
            fi
          fi
          echo "Changed files:"; echo "$FILES" | sed 's/^/  /'

          app=false; operator=false; metering=false; billing=false
          workspace=false; agent=false

          # Paths that never trigger an image rebuild (chart-only releases).
          is_inert() {
            case "$1" in
              charts/*|deploy/*|scripts/*|.github/*|*.md|mise.toml|.trivyignore|VERSION|go.work) return 0 ;;
              *) return 1 ;;
            esac
          }

          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              app/*)        app=true ;;
              agent/*)      agent=true; workspace=true ;;
              workspace/*)  workspace=true ;;
              operator/*)   operator=true ;;
              metering/*)   metering=true ;;
              billing/*)    billing=true ;;
              *)
                if ! is_inert "$f"; then
                  # Unmapped path: fail safe and rebuild everything.
                  REBUILD_ALL=true
                fi
                ;;
            esac
          done <<< "$FILES"

          if [ "$REBUILD_ALL" = "true" ]; then
            echo "Unmapped/new path or first release — rebuilding all images."
            app=true; operator=true; metering=true; billing=true
            workspace=true; agent=true
          fi

          go_any=false
          if $operator || $metering || $billing; then go_any=true; fi

          docker_any=false
          if echo "$FILES" | grep -qE 'Dockerfile|\.trivyignore'; then docker_any=true; fi
          if [ "$REBUILD_ALL" = "true" ]; then docker_any=true; fi

          # ── Build the dynamic image matrix (only changed images) ────────────
          matrix='[]'
          add() { matrix=$(echo "$matrix" | jq -c --arg n "$1" --arg c "$2" --arg d "$3" --arg i "$4" \
            '. += [{"name":$n,"context":$c,"dockerfile":$d,"image":$i}]'); }
          $app       && add app       app  app/Dockerfile       app
          $operator  && add operator  operator operator/Dockerfile operator
          $metering  && add metering  metering metering/Dockerfile metering
          $billing   && add billing   billing  billing/Dockerfile  billing
          $workspace && add workspace .    workspace/Dockerfile workspace
          true

          {
            echo "app=$app"
            echo "operator=$operator"
            echo "metering=$metering"
            echo "billing=$billing"
            echo "workspace=$workspace"
            echo "agent=$agent"
            echo "go_any=$go_any"
            echo "docker_any=$docker_any"
            echo "images_json=$matrix"
          } >> "$GITHUB_OUTPUT"
          echo "Image matrix: $matrix"

# ─────────────────────────────────────────────────────────────────────────────
# LINT (scoped to changed components)
# ─────────────────────────────────────────────────────────────────────────────
  lint-go:
    name: Lint / Go
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.go_any == 'true'
    strategy:
      fail-fast: false
      matrix:
        module: [operator, metering, billing]
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: actions/setup-go@v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: golangci-lint (${{ matrix.module }})
        uses: golangci/golangci-lint-action@v9.2.1
        with:
          version: latest
          working-directory: ${{ matrix.module }}
          args: --timeout=5m ./...

  lint-rust:
    name: Lint / Rust
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.agent == 'true'
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: agent

      - name: cargo fmt check
        run: cargo fmt --manifest-path agent/Cargo.toml --check

      - name: cargo clippy
        run: cargo clippy --manifest-path agent/Cargo.toml --all-targets -- -D warnings

  lint-js:
    name: Lint / JS
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.app == 'true'
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: app

      - name: svelte-check
        run: npm run check
        working-directory: app

# ─────────────────────────────────────────────────────────────────────────────
# SECURITY (scoped to changed components)
# ─────────────────────────────────────────────────────────────────────────────
  security-go:
    name: Security / Go (govulncheck)
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.go_any == 'true'
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: actions/setup-go@v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          # no single root go.sum (three modules) — skip the module cache
          cache: false

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: govulncheck (per module)
        # exit 3 = vulns in required modules but not in called code (informational); fail only on exit 1/2
        run: |
          for m in operator metering billing; do
            echo "::group::govulncheck $m"
            (cd "$m" && govulncheck -scan=package ./...) || [ $? -eq 3 ]
            echo "::endgroup::"
          done

  security-rust:
    name: Security / Rust (cargo-audit)
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.agent == 'true'
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: agent

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: cargo audit
        run: cargo audit
        working-directory: agent

  security-containers:
    name: Security / Containers (trivy)
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.docker_any == 'true'
    # Scan Dockerfiles for misconfigurations without building images
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Trivy config scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: .
          exit-code: 1
          severity: CRITICAL,HIGH
          trivyignores: .trivyignore

# ─────────────────────────────────────────────────────────────────────────────
# CI GATE — single always-run aggregator. Make THIS the required status check.
# Succeeds when every conditional job passed or was skipped; fails if any failed.
# ─────────────────────────────────────────────────────────────────────────────
  ci-passed:
    name: CI passed
    runs-on: ubuntu-latest
    if: always()
    needs: [changes, lint-go, lint-rust, lint-js, security-go, security-rust, security-containers]
    steps:
      - name: Verify no upstream job failed
        shell: bash
        run: |
          results='${{ toJSON(needs) }}'
          echo "$results" | jq -r 'to_entries[] | "\(.key): \(.value.result)"'
          if echo "$results" | jq -e 'to_entries[] | select(.value.result == "failure" or .value.result == "cancelled")' >/dev/null; then
            echo "::error::One or more required jobs failed."
            exit 1
          fi
          echo "All required jobs passed or were skipped."

# ─────────────────────────────────────────────────────────────────────────────
# VERSION — calculate next semver from conventional commits since last tag
# ─────────────────────────────────────────────────────────────────────────────
  version:
    name: Calculate version
    runs-on: ubuntu-latest
    needs: [ci-passed]
    # ci-passed is an always() aggregator; gate explicitly on its result so this
    # job isn't skip-propagated when ci-passed's own upstreams were skipped.
    if: >-
      always() &&
      needs.ci-passed.result == 'success' &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    outputs:
      version: ${{ steps.calc.outputs.version }}
      version_bare: ${{ steps.calc.outputs.version_bare }}
      prev_tag: ${{ steps.calc.outputs.prev_tag }}
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0  # full history for git log

      - name: Calculate next semver
        id: calc
        shell: bash
        run: |
          set -euo pipefail

          # Find the most recent semver tag (v0.0.0 if none)
          PREV_TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -1)
          PREV_TAG=${PREV_TAG:-v0.0.0}
          echo "prev_tag=${PREV_TAG}" >> "$GITHUB_OUTPUT"

          # Parse current version
          BARE=${PREV_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BARE"
          MAJOR=${MAJOR:-0}; MINOR=${MINOR:-0}; PATCH=${PATCH:-0}

          # Read commits since last tag
          if [ "$PREV_TAG" = "v0.0.0" ]; then
            COMMITS=$(git log --pretty=format:"%s" 2>/dev/null || true)
          else
            COMMITS=$(git log "${PREV_TAG}..HEAD" --pretty=format:"%s" 2>/dev/null || true)
          fi

          # Determine bump level (highest wins: major > minor > patch)
          BUMP=patch
          while IFS= read -r msg; do
            [ -z "$msg" ] && continue
            # Breaking change: feat!: or fix!: or "BREAKING CHANGE:" in body
            if echo "$msg" | grep -qP '^[a-z]+(\([^)]+\))?!:' || echo "$msg" | grep -qi 'BREAKING.CHANGE'; then
              BUMP=major
              break
            fi
            # New feature
            if echo "$msg" | grep -qP '^feat(\([^)]+\))?:'; then
              [ "$BUMP" != "major" ] && BUMP=minor
            fi
          done <<< "$COMMITS"

          echo "Bump level: ${BUMP} (from ${PREV_TAG})"

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0;           PATCH=0 ;;
            minor)                        MINOR=$((MINOR+1)); PATCH=0 ;;
            patch)                                            PATCH=$((PATCH+1)) ;;
          esac

          VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          VERSION_BARE="${MAJOR}.${MINOR}.${PATCH}"
          echo "New version: ${VERSION}"
          echo "version=${VERSION}"       >> "$GITHUB_OUTPUT"
          echo "version_bare=${VERSION_BARE}" >> "$GITHUB_OUTPUT"

# ─────────────────────────────────────────────────────────────────────────────
# STAGING BRANCH — bump chart + changed-component tags, commit, tag
# ─────────────────────────────────────────────────────────────────────────────
  staging-branch:
    name: Create staging branch & tag
    runs-on: ubuntu-latest
    needs: [version, changes]
    # version is always()-gated; check its result explicitly to avoid skip-propagation.
    if: always() && needs.version.result == 'success' && needs.changes.result == 'success'
    outputs:
      sha: ${{ steps.push.outputs.sha }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name  "enzarb-release-bot"
          git config user.email "release-bot@enzarb.dev"

      - name: Create staging branch
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          BRANCH="staging/${VERSION}"
          git checkout -b "$BRANCH"
          echo "branch=${BRANCH}" >> "$GITHUB_ENV"

      - name: Bump Rust agent version
        if: needs.changes.outputs.workspace == 'true'
        env:
          VERSION_BARE: ${{ needs.version.outputs.version_bare }}
        run: |
          sed -i "s/^version = \".*\"/version = \"${VERSION_BARE}\"/" agent/Cargo.toml
          # Keep Cargo.lock in sync so cargo fetch --locked doesn't fail
          sed -i "/^name = \"project-agent\"/{n;s/^version = \".*\"/version = \"${VERSION_BARE}\"/}" agent/Cargo.lock

      - name: Bump app version
        if: needs.changes.outputs.app == 'true'
        env:
          VERSION_BARE: ${{ needs.version.outputs.version_bare }}
        run: |
          jq --arg v "$VERSION_BARE" '.version = $v' app/package.json > app/package.json.tmp
          mv app/package.json.tmp app/package.json

      - name: Bump Helm chart version (always)
        env:
          VERSION: ${{ needs.version.outputs.version }}
          VERSION_BARE: ${{ needs.version.outputs.version_bare }}
        run: |
          for chart in charts/*/Chart.yaml; do
            sed -i \
              -e "s/^version: .*/version: ${VERSION_BARE}/" \
              -e "s/^appVersion: .*/appVersion: \"${VERSION}\"/" \
              "$chart"
          done

      - name: Re-pin changed component image tags
        env:
          VERSION: ${{ needs.version.outputs.version }}
        # SET_* (job-level env) carry the change-detection booleans. Only changed
        # components advance to the new version; unchanged components keep theirs.
        run: |
          set_tag() {
            VERSION="$VERSION" yq -i ".${1}.image.tag = strenv(VERSION)" charts/enzarb/values.yaml
            echo "  pinned ${1} -> ${VERSION}"
          }
          [ "$SET_APP" = "true" ]       && set_tag app
          [ "$SET_OPERATOR" = "true" ]  && set_tag operator
          [ "$SET_METERING" = "true" ]  && set_tag metering
          [ "$SET_BILLING" = "true" ]   && set_tag billing
          [ "$SET_WORKSPACE" = "true" ] && set_tag workspace
          echo "Resulting image tags:"
          yq '{"app":.app.image.tag,"operator":.operator.image.tag,"metering":.metering.image.tag,"billing":.billing.image.tag,"workspace":.workspace.image.tag}' charts/enzarb/values.yaml

      - name: Write VERSION file
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: echo "$VERSION" > VERSION

      - name: Bump deploy file version pins
        env:
          VERSION_BARE: ${{ needs.version.outputs.version_bare }}
        run: |
          # Update HelmChart CR chart version pin to match new release
          sed -i "s|^\(\s*version:\) .*|\1 ${VERSION_BARE}|" \
            deploy/enzarb/enzarb.yaml

      - name: Commit version bump
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          git add \
            agent/Cargo.toml \
            agent/Cargo.lock \
            app/package.json \
            charts/enzarb/Chart.yaml \
            charts/enzarb/values.yaml \
            deploy/enzarb/enzarb.yaml \
            VERSION
          git commit -m "chore: release ${VERSION} [skip ci]"

      - name: Tag release
        env:
          VERSION: ${{ needs.version.outputs.version }}
          PREV_TAG: ${{ needs.version.outputs.prev_tag }}
        run: |
          # Generate release notes from conventional commits
          if [ "$PREV_TAG" = "v0.0.0" ]; then
            NOTES=$(git log --pretty=format:"- %s" | head -50)
          else
            NOTES=$(git log "${PREV_TAG}..HEAD~1" --pretty=format:"- %s")
          fi
          git tag -a "$VERSION" -m "Release ${VERSION}" -m "${NOTES}"

      - name: Push branch and tag
        id: push
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          git push origin "staging/${VERSION}"
          git push origin "$VERSION"
          SHA=$(git rev-parse HEAD)
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
    env:
      SET_APP: ${{ needs.changes.outputs.app }}
      SET_OPERATOR: ${{ needs.changes.outputs.operator }}
      SET_METERING: ${{ needs.changes.outputs.metering }}
      SET_BILLING: ${{ needs.changes.outputs.billing }}
      SET_WORKSPACE: ${{ needs.changes.outputs.workspace }}

# ─────────────────────────────────────────────────────────────────────────────
# BUILD — only the changed container images (+ Helm charts)
# ─────────────────────────────────────────────────────────────────────────────
  build-images:
    name: Build & Push / Container images
    runs-on: ubuntu-latest
    needs: [version, staging-branch, changes]
    if: >-
      always() &&
      needs.version.result == 'success' &&
      needs.staging-branch.result == 'success' &&
      needs.changes.outputs.images_json != '[]'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include: ${{ fromJSON(needs.changes.outputs.images_json) }}
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          ref: ${{ needs.staging-branch.outputs.sha }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Log in to ghcr.io
        uses: docker/login-action@v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v7.2.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.image }}:${{ needs.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.image }}:latest
          labels: |
            org.opencontainers.image.version=${{ needs.version.outputs.version }}
            org.opencontainers.image.revision=${{ needs.staging-branch.outputs.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-charts:
    name: Build & Push / Helm charts
    runs-on: ubuntu-latest
    needs: [version, staging-branch]
    if: always() && needs.version.result == 'success' && needs.staging-branch.result == 'success'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          ref: ${{ needs.staging-branch.outputs.sha }}

      - name: Install Helm
        uses: azure/setup-helm@v5.0.0
        with:
          version: latest

      - name: Log in to ghcr.io (Helm OCI)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login \
            ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Lint charts
        run: helm lint charts/enzarb

      - name: Package charts
        env:
          VERSION_BARE: ${{ needs.version.outputs.version_bare }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          mkdir -p dist/charts
          helm package charts/enzarb --version "$VERSION_BARE" --app-version "$VERSION" --destination dist/charts/

      - name: Push charts to ghcr.io OCI registry
        run: |
          for pkg in dist/charts/*.tgz; do
            helm push "$pkg" "oci://${{ env.REGISTRY }}/${{ env.ORG }}/charts"
          done

      - name: Upload packaged charts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: helm-charts
          path: dist/charts/
          retention-days: 7

# ─────────────────────────────────────────────────────────────────────────────
# RELEASE — GitHub release + cleanup staging branch
# ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: [build-images, build-charts, version, staging-branch]
    # build-images may be skipped on a chart-only release — only require it not to have failed.
    if: >-
      always() &&
      needs.build-charts.result == 'success' &&
      needs.staging-branch.result == 'success' &&
      (needs.build-images.result == 'success' || needs.build-images.result == 'skipped')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0
          ref: ${{ needs.staging-branch.outputs.sha }}

      - name: Download Helm charts
        uses: actions/download-artifact@v8.0.1
        with:
          name: helm-charts
          path: dist/charts/

      - name: Generate changelog
        id: changelog
        env:
          VERSION: ${{ needs.version.outputs.version }}
          PREV_TAG: ${{ needs.version.outputs.prev_tag }}
        run: |
          if [ "$PREV_TAG" = "v0.0.0" ]; then
            LOG=$(git log --pretty=format:"- %s (%h)" | head -50)
          else
            LOG=$(git log "${PREV_TAG}..HEAD~1" --pretty=format:"- %s (%h)")
          fi

          # Group by conventional commit type
          BREAKING=$(echo "$LOG" | grep -P '^- [a-z]+(\([^)]+\))?!:' || true)
          FEATURES=$(echo "$LOG" | grep -P '^- feat(\([^)]+\))?:' || true)
          FIXES=$(echo "$LOG" | grep -P '^- fix(\([^)]+\))?:' || true)
          OTHER=$(echo "$LOG" | grep -vP '^- (feat|fix|[a-z]+!):' || true)

          # Per-component image tags come from the (already re-pinned) values.yaml.
          IMAGES=$(yq '
            [
              "workspace:" + .workspace.image.tag,
              "operator:"  + .operator.image.tag,
              "metering:"  + .metering.image.tag,
              "billing:"   + .billing.image.tag,
              "app:"       + .app.image.tag
            ] | .[]' charts/enzarb/values.yaml)

          {
            echo "## What's Changed"
            echo ""
            [ -n "$BREAKING" ] && echo "### ⚠ Breaking Changes" && echo "$BREAKING" && echo ""
            [ -n "$FEATURES" ] && echo "### ✨ Features"        && echo "$FEATURES" && echo ""
            [ -n "$FIXES"    ] && echo "### 🐛 Bug Fixes"       && echo "$FIXES"    && echo ""
            [ -n "$OTHER"    ] && echo "### 🔧 Other Changes"   && echo "$OTHER"    && echo ""
            echo "---"
            echo "**Container images** (ghcr.io/enzarb) — only changed components advanced this release:"
            echo '```'
            echo "$IMAGES"
            echo '```'
            echo ""
            echo "**Helm chart** (oci://ghcr.io/enzarb/charts):"
            echo '```'
            echo "helm install enzarb oci://ghcr.io/enzarb/charts/enzarb --version ${{ needs.version.outputs.version_bare }}"
            echo '```'
          } > release-notes.md

          # Pass multiline output via env file
          {
            echo "notes<<RELEASE_NOTES_EOF"
            cat release-notes.md
            echo "RELEASE_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: ${{ needs.version.outputs.version }}
          name: ${{ needs.version.outputs.version }}
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: false
          files: dist/charts/*.tgz

      - name: Delete staging branch
        env:
          VERSION: ${{ needs.version.outputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh api repos/${{ github.repository }}/git/refs/heads/staging/${VERSION} -X DELETE

      - name: Delete any other orphaned staging branches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/branches \
            --paginate --jq '.[].name' \
            | grep '^staging/' \
            | while read -r branch; do
                echo "Deleting orphaned branch: $branch"
                gh api "repos/${{ github.repository }}/git/refs/heads/${branch}" -X DELETE
              done
