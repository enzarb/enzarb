  <rect x="14" y="16" width="22" height="6" rx="2" fill="#6c6cff"/>
  <rect x="14" y="29" width="18" height="6" rx="2" fill="#6c6cff"/>
  <rect x="14" y="42" width="22" height="6" rx="2" fill="#6c6cff"/>
  <!-- z letterform -->
  <rect x="42" y="16" width="10" height="5" rx="2" fill="#9d9dff"/>
  <polygon points="42,21 52,21 42,43 52,43 52,48 42,48 42,43 52,21" fill="#9d9dff"/>
  <rect x="42" y="43" width="10" height="5" rx="2" fill="#9d9dff"/>
</svg>
