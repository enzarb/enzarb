[tools]
claude = "latest"
node = "lts"
go = "1.26"
rust = "latest"
kubectl = "latest"
kubebuilder = "latest"
"go:github.com/golangci/golangci-lint/v2/cmd/golangci-lint" = "latest"
"go:golang.org/x/vuln/cmd/govulncheck" = "latest"

[tasks.deploy]
description = "Idempotent full deploy: secrets → system → enzarb"
run = """
set -euo pipefail
NS=enzarb-system

echo "==> [1/4] Ensuring auto-generated secrets..."
bash scripts/setup-secrets.sh "$NS"

echo "==> [2/4] Deploying system charts (Dex, Zot)..."
kubectl apply -f deploy/system/
kubectl annotate helmchart -n kube-system dex zot \
  "enzarb.dev/last-deployed=$(date -u +%Y-%m-%dT%H:%M:%SZ)" --overwrite

echo "==> [3/4] Applying CRDs..."
cd operator && controller-gen crd paths='./...' output:crd:artifacts:config=config/crd && cd ..
kubectl apply -f operator/config/crd/

echo "==> [4/4] Deploying enzarb (operator, app, authd, metering)..."
LATEST=$(gh release list --repo enzarb/enzarb --limit 1 --json tagName --jq '.[0].tagName | ltrimstr("v")')
echo "    Deploying enzarb v${LATEST}"
sed -i "s/^  version: .*/  version: ${LATEST}/" deploy/enzarb/enzarb.yaml
kubectl apply -f deploy/enzarb/

echo "==> Done. Check status with: mise run status"
"""

[tasks.deploy-system]
description = "Apply system HelmChart CRs and force re-reconciliation to upgrade to latest"
run = """
kubectl apply -f deploy/system/
kubectl annotate helmchart -n kube-system dex zot \
  "enzarb.dev/last-deployed=$(date -u +%Y-%m-%dT%H:%M:%SZ)" --overwrite
"""

[tasks.generate-crds]
description = "Regenerate CRD YAML from Go types via controller-gen"
run = "cd operator && controller-gen crd paths='./...' output:crd:artifacts:config=config/crd"

[tasks.deploy-crds]
description = "Regenerate and apply CRDs to the cluster"
depends = ["generate-crds"]
run = "kubectl apply -f operator/config/crd/"

[tasks.deploy-enzarb]
description = "Upgrade enzarb to latest release, apply CRDs, then apply"
depends = ["deploy-crds"]
run = """
LATEST=$(gh release list --repo enzarb/enzarb --limit 1 --json tagName --jq '.[0].tagName | ltrimstr("v")')
echo "Deploying enzarb v${LATEST}"
sed -i "s/^  version: .*/  version: ${LATEST}/" deploy/enzarb/enzarb.yaml
kubectl apply -f deploy/enzarb/
"""

[tasks.deploy-all]
description = "Deploy everything (alias for deploy)"
depends = ["deploy"]

[tasks.undeploy]
description = "Remove all HelmChart CRs"
run = "kubectl delete -f deploy/system/ -f deploy/enzarb/ --ignore-not-found"

[tasks.status]
description = "Show HelmChart and operator status"
run = "kubectl get helmchart -A && kubectl get project,environment -A"

[tasks.logs-operator]
description = "Stream operator logs"
run = "kubectl logs -n enzarb-system -l app=enzarb-operator -f"

[tasks.admin]
description = "Run operator admin CLI"
run = "kubectl exec -n enzarb-system deploy/enzarb-operator -- enzarb admin"

[tasks.build-agent]
description = "Build project-agent binary"
run = "cd agent && cargo build --release"

[tasks.build-operator]
description = "Build enzarb-operator binary"
run = "cd operator && go build ./cmd/operator/"

[tasks.build-metering]
description = "Build enzarb-metering binary"
run = "cd metering && go build ./cmd/metering/"

[tasks.build-billing]
description = "Build enzarb-billing binary"
run = "cd billing && go build ./cmd/billing/"

[tasks.build-authd]
description = "Build enzarb-authd binary"
run = "cd authd && go build ./cmd/authd/"

[tasks.build-app]
description = "Build SvelteKit app"
run = "cd app && npm run build"

[tasks.build-all]
description = "Build all components"
depends = ["build-agent", "build-operator", "build-metering", "build-billing", "build-authd", "build-app"]

[tasks.test-agent]
description = "Run agent tests"
run = "cd agent && cargo test"

[tasks.test-operator]
description = "Run operator tests"
run = "cd operator && go test ./..."

[tasks.test-metering]
description = "Run metering tests"
run = "cd metering && go test ./..."

[tasks.test-billing]
description = "Run billing tests"
run = "cd billing && go test ./..."

[tasks.test-authd]
description = "Run authd tests"
run = "cd authd && go test ./..."

[tasks.test-app]
description = "Run app tests"
run = "cd app && npm test"

[tasks.test-all]
description = "Run all tests"
depends = ["test-agent", "test-operator", "test-metering", "test-billing", "test-authd", "test-app"]

[tasks.dev-app]
description = "Run SvelteKit dev server"
run = "cd app && npm run dev"

[tasks.install-hooks]
description = "Install git hooks (pre-commit)"
run = "cp scripts/pre-commit .git/hooks/pre-commit && chmod +x .git/hooks/pre-commit && echo 'pre-commit hook installed'"

[tasks.lint]
description = "Run all linters (same as pre-commit, no staged-file filter)"
run = "bash scripts/pre-commit"
env = { STAGED_OVERRIDE = "all" }
