---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: alloweddomains.enzarb.io
spec:
  group: enzarb.io
  names:
    kind: AllowedDomains
    listKind: AllowedDomainsList
    plural: alloweddomains
    shortNames:
    - alloweddomain
    singular: alloweddomains
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.fqdns
      name: FQDNs
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          AllowedDomains is the operator-maintained, per-deploy-namespace source of
          truth for which hostnames a project's tenant-authored Gateway API routes
          (HTTPRoute/GRPCRoute) and Ingresses are permitted to claim.
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            properties:
              fqdns:
                description: |-
                  FQDNs is the exact set of hostnames permitted in this namespace. A
                  wildcard entry ("*.example.com") additionally permits any single-label
                  subdomain of example.com.
                items:
                  type: string
                type: array
            type: object
        type: object
    served: true
    storage: true
