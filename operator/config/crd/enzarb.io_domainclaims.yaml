---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: domainclaims.enzarb.io
spec:
  group: enzarb.io
  names:
    kind: DomainClaim
    listKind: DomainClaimList
    plural: domainclaims
    shortNames:
    - domainclaim
    singular: domainclaim
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.fqdn
      name: FQDN
      type: string
    - jsonPath: .spec.projectRef
      name: Project
      type: string
    - jsonPath: .status.verifiedAt
      name: Verified
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          DomainClaim is the cluster-scoped ownership ledger for custom domains. Its
          metadata.name is a hash of the FQDN, so etcd's name uniqueness guarantees a
          given hostname can be bound to exactly one project: the operator Creates the
          claim only after DNS ownership is proven, and a second project's Create of the
          same name fails, hard-blocking domain hijacking regardless of route
          creationTimestamp ordering.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            properties:
              fqdn:
                type: string
              namespace:
                type: string
              orgID:
                description: |-
                  OrgID, ProjectRef and Namespace identify the owning project. Re-verification
                  and route admission are only honored for the project recorded here.
                type: string
              projectRef:
                type: string
            required:
            - fqdn
            - namespace
            - orgID
            - projectRef
            type: object
          status:
            properties:
              verifiedAt:
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
