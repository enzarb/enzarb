apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: enzarb
  namespace: kube-system
spec:
  chart: oci://ghcr.io/enzarb/charts/enzarb
  version: 0.55.2
  targetNamespace: enzarb-system
  createNamespace: true
  valuesContent: |-
    app:
      env:
        ORIGIN: https://enzarb.dev
    operator:
      env:
        ENZARB_DOMAIN: enzarb.dev
    gateway:
      loadBalancerIP: "192.168.33.83"
    github:
      oauthClientId: "Ov23liey07qro1Cj9kkh"
