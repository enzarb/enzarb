apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: enzarb
  namespace: kube-system
spec:
  chart: oci://ghcr.io/enzarb/charts/enzarb
  version: 0.105.1
  targetNamespace: enzarb-system
  createNamespace: true
  valuesContent: |-
    app:
      env:
        ORIGIN: https://enzarb.dev
    operator:
      env:
        ENZARB_DOMAIN: enzarb.dev
    gateway:
      loadBalancerIP: "192.168.33.83"
    github:
      oauthEnabled: true
    workspace:
      # oldie lacks AVX2, and the workspace image's bundled Bun-compiled
      # claude CLI segfaults there. omnilap is labeled enzarb.io/avx2=true;
      # pin workspace pods there until oldie is replaced or upgraded.
      nodeSelector:
        enzarb.io/avx2: "true"
