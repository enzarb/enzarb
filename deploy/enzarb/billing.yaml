apiVersion: apps/v1
kind: Deployment
metadata:
  name: enzarb-billing
  namespace: enzarb-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: enzarb-billing
  template:
    metadata:
      labels:
        app: enzarb-billing
    spec:
      serviceAccountName: enzarb-billing
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: billing
          image: ghcr.io/enzarb/billing:v0.1.19
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: enzarb-db-app
                  key: uri
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: enzarb-billing
  namespace: enzarb-system
