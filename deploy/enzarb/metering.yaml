apiVersion: apps/v1
kind: Deployment
metadata:
  name: enzarb-metering
  namespace: enzarb-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: enzarb-metering
  template:
    metadata:
      labels:
        app: enzarb-metering
    spec:
      serviceAccountName: enzarb-metering
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: metering
          image: ghcr.io/enzarb/metering:v0.1.20
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: enzarb-db-app
                  key: uri
            - name: HUBBLE_LOG_PATH
              value: /var/run/cilium/hubble/events.log
          volumeMounts:
            - name: hubble-log
              mountPath: /var/run/cilium/hubble
              readOnly: true
      volumes:
        - name: hubble-log
          hostPath:
            path: /var/run/cilium/hubble
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: enzarb-metering
  namespace: enzarb-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: enzarb-metering
rules:
  - apiGroups: [""]
    resources: ["namespaces", "pods", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: enzarb-metering
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: enzarb-metering
subjects:
  - kind: ServiceAccount
    name: enzarb-metering
    namespace: enzarb-system
