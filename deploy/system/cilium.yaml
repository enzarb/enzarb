apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: cilium
  namespace: kube-system
spec:
  bootstrap: true
  chart: cilium
  repo: https://helm.cilium.io/
  version: 1.17.2
  targetNamespace: kube-system
  valuesContent: |-
    kubeProxyReplacement: true
    k8sServiceHost: 127.0.0.1
    k8sServicePort: 6443
    gatewayAPI:
      enabled: true
    envoy:
      enabled: true
    operator:
      replicas: 1
    l2announcements:
      enabled: true
    ipam:
      mode: kubernetes
    hubble:
      relay:
        enabled: true
      ui:
        enabled: true
      export:
        static:
          enabled: true
          filePath: /var/run/cilium/hubble/events.log
---
apiVersion: cilium.io/v2alpha1
kind: CiliumLoadBalancerIPPool
metadata:
  name: local-pool
spec:
  blocks:
    - start: "192.168.33.81"
      stop: "192.168.33.99"
---
apiVersion: cilium.io/v2alpha1
kind: CiliumL2AnnouncementPolicy
metadata:
  name: default-l2
spec:
  externalIPs: true
  loadBalancerIPs: true
  interfaces:
    - enp0s31f6   # omnilap (control-plane)
    - enp4s0f1    # oldie (worker)
