apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: cilium
  namespace: kube-system
spec:
  chart: cilium
  repo: https://helm.cilium.io/
  targetNamespace: kube-system
  valuesContent: |-
    hubble:
      enabled: true
      relay:
        enabled: true
      export:
        filenode:
          enabled: true
          filePath: /var/run/cilium/hubble/events.log
    operator:
      replicas: 1
    kubeProxyReplacement: true
    k8sServiceHost: "localhost"
    k8sServicePort: "6443"
