# Kubelet image credential provider for the in-cluster Zot registry.
#
# Lets pods pull private images from registry.enzarb.dev WITHOUT an
# imagePullSecret. On image pull the kubelet execs `kubelet-credential-enzarb`,
# which hands back the pod's SA token (audience registry-pull.enzarb.dev). The
# kubelet then runs the normal Docker bearer-token flow against authd, which
# mints a pull-only JWT scoped to the pod's project (see authd authenticateRegistry).
#
# Requires Kubernetes v1.33+ (pod-bound SA token delivered to the provider via
# tokenAttributes.serviceAccountTokenAudience).
#
# This DaemonSet stages the binary, the CredentialProviderConfig, and a k3s
# kubelet-arg snippet onto every node. The kubelet args only take effect after
# k3s restarts on each node:
#     sudo systemctl restart k3s        # servers
#     sudo systemctl restart k3s-agent  # agents
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: enzarb-credential-provider-installer
  namespace: kube-system
  labels:
    app.kubernetes.io/managed-by: enzarb
    app.kubernetes.io/component: credential-provider
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: credential-provider
  template:
    metadata:
      labels:
        app.kubernetes.io/component: credential-provider
    spec:
      # No imagePullSecret here either: the installer image is public on GHCR.
      # Pod-level securityContext (non-default) — the install container still runs
      # as root since it writes to root-owned hostPath dirs, but capabilities are
      # dropped and privilege escalation is disabled.
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      tolerations:
        - operator: Exists # install on every node, including control-plane/tainted
      initContainers:
        - name: install
          image: ghcr.io/enzarb/workspace:v0.17.1
          securityContext:
            # The workspace image runs as USER user; the installer must write to
            # root-owned hostPath dirs, so it explicitly runs as root.
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          command:
            - sh
            - -c
            - |
              set -eu
              install -D -m 0755 /usr/local/bin/kubelet-credential-enzarb \
                /host/credentialprovider/bin/kubelet-credential-enzarb

              cat > /host/credentialprovider/config.yaml <<'YAML'
              apiVersion: kubelet.config.k8s.io/v1
              kind: CredentialProviderConfig
              providers:
                - name: kubelet-credential-enzarb
                  matchImages:
                    - "registry.enzarb.dev"
                  defaultCacheDuration: "2m"
                  apiVersion: credentialprovider.kubelet.k8s.io/v1
                  # k8s v1.33+: deliver a pod-bound SA token to the plugin.
                  tokenAttributes:
                    # cacheType is required when tokenAttributes is set; cache by
                    # service account since pull scope is per-project (= per SA).
                    cacheType: ServiceAccount
                    serviceAccountTokenAudience: registry-pull.enzarb.dev
                    requireServiceAccount: true
              YAML

              cat > /host/k3s-config/90-credential-provider.yaml <<'YAML'
              kubelet-arg:
                - "image-credential-provider-config=/var/lib/rancher/credentialprovider/config.yaml"
                - "image-credential-provider-bin-dir=/var/lib/rancher/credentialprovider/bin"
              YAML
              echo "installed; restart k3s on this node to apply kubelet args"
          volumeMounts:
            - name: credentialprovider
              mountPath: /host/credentialprovider
            - name: k3s-config
              mountPath: /host/k3s-config
      containers:
        # Keep the DS pod alive so the installer re-runs when a node is replaced.
        - name: pause
          image: registry.k8s.io/pause:3.10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65535
            capabilities:
              drop: [ALL]
      volumes:
        - name: credentialprovider
          hostPath:
            path: /var/lib/rancher/credentialprovider
            type: DirectoryOrCreate
        - name: k3s-config
          hostPath:
            path: /etc/rancher/k3s/config.yaml.d
            type: DirectoryOrCreate
