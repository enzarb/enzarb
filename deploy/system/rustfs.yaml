apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: rustfs
  namespace: kube-system
spec:
  chart: rustfs
  repo: https://charts.rustfs.com/
  targetNamespace: enzarb-system
  createNamespace: true
  valuesContent: |-
    mode: standalone
    persistence:
      enabled: true
      size: 100Gi
    service:
      type: ClusterIP
      port: 9000
    rootUser: enzarb
    rootPassword: changeme  # override via sealed secret in production
