apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: dex
  namespace: kube-system
spec:
  chart: dex
  repo: https://charts.dexidp.io
  targetNamespace: enzarb-system
  createNamespace: true
  valuesContent: |-
    config:
      issuer: https://auth.enzarb.dev
      storage:
        type: postgres
        config:
          host: enzarb-db.enzarb-system
          port: 5432
          database: dex
          user: dex
          password: $password
          ssl:
            mode: disable
      web:
        http: 0.0.0.0:5556
      oauth2:
        # Skip the "Grant Access" consent screen for all clients. The
        # per-staticClient skipApprovalScreen is not reliably honored; this
        # global oauth2 toggle is the canonical Dex setting.
        skipApprovalScreen: true
      frontend:
        theme: custom
        issuer: enzarb
        logoURL: theme/logo.svg
      connectors:
        - type: oidc
          id: google
          name: Google
          config:
            issuer: https://accounts.google.com
            clientID: 600997651205-98h88bt402cl69l9atah0q47rlkhvot0.apps.googleusercontent.com
            clientSecret: $GOOGLE_CLIENT_SECRET
            redirectURI: https://auth.enzarb.dev/callback
      staticClients:
        - id: enzarb-app
          name: Enzarb
          redirectURIs:
            - https://enzarb.dev/auth/callback
          secretEnv: DEX_ENZARB_APP_SECRET
          skipApprovalScreen: true
    envFrom:
      - secretRef:
          name: enzarb-db-dex-credentials
          optional: false
      - secretRef:
          name: enzarb-dex-google
          optional: false
    volumes:
      - name: theme
        configMap:
          name: dex-theme
    volumeMounts:
      - name: theme
        mountPath: /srv/dex/web/themes/custom
