apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: zot
  namespace: kube-system
spec:
  chart: zot
  repo: https://zotregistry.dev/helm-charts/
  version: 0.1.118  # zot app v2.1.18
  targetNamespace: enzarb-system
  createNamespace: true
  valuesContent: |-
    # S3 credentials come from the OBC (deploy/system/zot-bucket.yaml).
    # Rook provisions the bucket and writes:
    #   Secret      zot-registry → AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
    #   ConfigMap   zot-registry → BUCKET_HOST, BUCKET_PORT, BUCKET_NAME
    service:
      type: ClusterIP
    # zot does NOT expand env vars in its config, and the chart's mountConfig
    # mounts the config read-only — so we can't use placeholders there. Instead
    # an initContainer renders config.json (with the S3 secret expanded by the
    # shell) into a shared emptyDir that zot reads at /etc/zot/config.json. This
    # keeps the S3 credentials out of git while still enabling bearer auth.
    mountConfig: false
    persistence:
      enabled: true
      size: 1Gi
      storageClass: ceph-block-thin
    extraVolumes:
      # Shared, in-memory rendered config (written by the initContainer below).
      - name: rendered-config
        emptyDir:
          medium: Memory
      # Token-signing cert: authd signs registry tokens with the matching key;
      # zot trusts this cert as its bearer-auth anchor (see config below).
      - name: token-signing
        secret:
          secretName: registry-token-signing
    extraVolumeMounts:
      - name: rendered-config
        mountPath: /etc/zot
      - name: token-signing
        mountPath: /etc/zot/token
        readOnly: true
    initContainers:
      - name: render-config
        image: busybox:1.36
        envFrom:
          - secretRef:
              name: zot-registry        # OBC-generated: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
          - configMapRef:
              name: zot-registry        # OBC-generated: BUCKET_HOST, BUCKET_PORT, BUCKET_NAME
        command:
          - sh
          - -c
          - |
            set -eu
            cat > /etc/zot/config.json <<JSON
            {
              "distSpecVersion": "1.1.0",
              "storage": {
                "rootDirectory": "/var/lib/registry",
                "dedupe": false,
                "storageDriver": {
                  "name": "s3",
                  "regionendpoint": "http://${BUCKET_HOST}:${BUCKET_PORT}",
                  "bucket": "${BUCKET_NAME}",
                  "region": "us-east-1",
                  "accesskey": "${AWS_ACCESS_KEY_ID}",
                  "secretkey": "${AWS_SECRET_ACCESS_KEY}",
                  "forcepathstyle": true,
                  "chunksize": "67108864"
                }
              },
              "http": {
                "address": "0.0.0.0",
                "port": "5000",
                "readTimeout": 0,
                "writeTimeout": 0,
                "auth": {
                  "bearer": {
                    "realm": "https://registry.enzarb.dev/auth/token",
                    "service": "registry.enzarb.dev",
                    "cert": "/etc/zot/token/tls.crt"
                  }
                },
                "accessControl": {
                  "repositories": {
                    "**": {
                      "defaultPolicy": ["read", "create", "update", "delete"]
                    }
                  },
                  "adminPolicy": {
                    "users": ["admin"],
                    "actions": ["read", "create", "update", "delete"]
                  }
                }
              },
              "log": { "level": "info" }
            }
            JSON
        volumeMounts:
          - name: rendered-config
            mountPath: /etc/zot
