apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: zot
  namespace: kube-system
spec:
  chart: zot
  repo: https://zotregistry.dev/helm-charts/
  targetNamespace: enzarb-system
  createNamespace: true
  valuesContent: |-
    # S3 credentials are injected from the zot-s3-credentials Secret.
    # Create it before deploying:
    #   kubectl -n enzarb-system create secret generic zot-s3-credentials \
    #     --from-literal=S3_ENDPOINT=http://<rook-ceph-rgw-svc>:80 \
    #     --from-literal=S3_BUCKET=zot-registry \
    #     --from-literal=S3_REGION=us-east-1 \
    #     --from-literal=S3_ACCESS_KEY=<access-key> \
    #     --from-literal=S3_SECRET_KEY=<secret-key>
    service:
      type: ClusterIP
    # NOTE: enabling bearer auth requires mountConfig:true so the chart mounts
    # config.json. But zot does NOT expand env vars in config, so the $S3_*
    # placeholders below break S3 storage when mounted (zot dials literal
    # "$S3_ENDPOINT"). Enabling auth therefore needs the config rendered first
    # (e.g. an initContainer running envsubst into a shared volume, or AWS_*
    # env + literal non-secret S3 fields). Left disabled until that's in place.
    mountConfig: false
    envFrom:
      - secretRef:
          name: zot-s3-credentials
    # Mount the shared token-signing cert. authd signs registry tokens with the
    # matching key; Zot trusts this cert as its bearer-auth anchor (see
    # http.auth.bearer.cert below). Same Secret as charts/enzarb authd.signingSecret.
    extraVolumes:
      - name: token-signing
        secret:
          secretName: registry-token-signing
    extraVolumeMounts:
      - name: token-signing
        mountPath: /etc/zot/token
        readOnly: true
    configFiles:
      config.json: |-
        {
          "distSpecVersion": "1.1.0",
          "storage": {
            "rootDirectory": "/var/lib/registry",
            "dedupe": false,
            "storageDriver": {
              "name": "s3",
              "regionendpoint": "$S3_ENDPOINT",
              "bucket": "$S3_BUCKET",
              "region": "$S3_REGION",
              "accesskey": "$S3_ACCESS_KEY",
              "secretkey": "$S3_SECRET_KEY",
              "forcepathstyle": true
            }
          },
          "http": {
            "address": "0.0.0.0",
            "port": "5000",
            "auth": {
              "bearer": {
                "realm": "https://registry.enzarb.dev/auth/token",
                "service": "registry.enzarb.dev",
                "cert": "/etc/zot/token/tls.crt"
              }
            }
          },
          "log": { "level": "info" }
        }
