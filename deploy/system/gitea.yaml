apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: gitea
  namespace: kube-system
spec:
  chart: gitea
  repo: https://dl.gitea.com/charts/
  targetNamespace: enzarb-system
  createNamespace: true
  valuesContent: |-
    gitea:
      config:
        server:
          # Internal-only: accessible within the cluster via gitea-http.enzarb-system.svc:3000
          DOMAIN: gitea-http.enzarb-system.svc.cluster.local
          ROOT_URL: http://gitea-http.enzarb-system.svc.cluster.local:3000
          LOCAL_ROOT_URL: http://gitea-http.enzarb-system.svc.cluster.local:3000
        database:
          DB_TYPE: postgres
          HOST: enzarb-db.enzarb-system:5432
          NAME: gitea
          USER: gitea
        auth:
          ENABLE_REVERSE_PROXY_AUTHENTICATION: true
          REVERSE_PROXY_AUTHENTICATION_USER: X-Gitea-User
          # We provision project users explicitly via the admin API (operator
          # ensureGiteaRepo); do NOT auto-register arbitrary proxied identities.
          ENABLE_REVERSE_PROXY_AUTO_REGISTRATION: false
          # SECURITY: Gitea trusts X-Gitea-User, which authd sets only after
          # validating the workspace SA token at the gateway. The primary control
          # against a pod reaching gitea-http directly and spoofing this header is
          # the NetworkPolicy `enzarb-gitea-ingress` (charts/enzarb), which limits
          # ingress to the platform namespace and the Envoy gateway. Given that,
          # trusting any immediate peer here is acceptable.
          REVERSE_PROXY_TRUSTED_PROXIES: "*"
      additionalConfigFromEnvs:
        - name: GITEA__database__PASSWD
          valueFrom:
            secretKeyRef:
              name: enzarb-db-gitea-credentials
              key: password
    service:
      http:
        type: ClusterIP
      ssh:
        type: ClusterIP
    persistence:
      enabled: true
      size: 20Gi
    postgresql:
      enabled: false
    postgresql-ha:
      enabled: false
